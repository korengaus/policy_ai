name: CI

# Phase 2 M13.0 — CI mirrors the local validation flow:
#
#     python scripts/validate.py
#     npm test
#     python scripts/run_operational_checks.py --profile quick
#
# If those commands pass locally, CI must pass too. validate.py owns the
# canonical test list; anything that belongs in CI gets added to
# validate.py rather than this workflow. The workflow only sets the env
# vars that influence behaviour to known-safe defaults and runs the
# canonical commands.
#
# Manual smoke against a deployed Render instance is preserved as a
# separate ``smoke-deployed`` job that only fires on workflow_dispatch
# with an explicit base URL — never on PRs or push.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      smoke_base_url:
        description: "Optional deployed app URL to smoke test (leave empty to skip)."
        required: false
        default: ""

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: "true"
      PYTHONUTF8: "1"
      # Explicit empty values — validate.py's M12.0a determinism guard
      # accepts unset / empty / "false" / "0" / "no" / "off" and refuses
      # to run otherwise.
      USE_POSTGRES_WRITE: ""
      DATABASE_URL: ""
      # Hard-disable any path that could reach OpenAI / external networks.
      OPENAI_API_KEY: ""
      SEMANTIC_MATCHING_ENABLED: "false"
      EMBEDDING_PROVIDER: "disabled"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Install Node dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi

      - name: Run validate.py (canonical Python + npm test suite)
        run: python scripts/validate.py

      - name: Run npm test (regression — explicit re-run for dashboard clarity)
        run: npm test

      - name: Run quick operational profile
        run: python scripts/run_operational_checks.py --profile quick --no-default-reports

      - name: Upload operational reports as artifact (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: operational-reports-${{ github.run_id }}
          path: reports/operational_check_*.json
          if-no-files-found: ignore
          retention-days: 7

  # ---------------------------------------------------------------------
  # Optional manual smoke against a deployed instance.
  #
  # Only fires on workflow_dispatch with a non-empty smoke_base_url. The
  # job is intentionally separate from python-tests so PRs and push runs
  # never touch a live deployment, never crawl real news sources, and
  # never call OpenAI.
  # ---------------------------------------------------------------------
  smoke-deployed:
    name: Smoke (deployed, manual only)
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.smoke_base_url != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: python-tests
    env:
      CI: "true"
      PYTHONUTF8: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Smoke test deployed async job
        run: |
          python scripts/smoke_async_job.py \
            --base-url "${{ github.event.inputs.smoke_base_url }}" \
            --query "전세사기" \
            --max-news 1
