<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>정책 AI 대시보드</title>
  <style>
    :root {
      --bg: #f3f5f8;
      --surface: #ffffff;
      --surface-soft: #f9fafb;
      --border: #d9dee7;
      --text: #1f2937;
      --muted: #6b7280;
      --blue: #2563eb;
      --blue-dark: #1d4ed8;
      --dark: #374151;
      --dark-hover: #111827;
      --red: #dc2626;
      --orange: #f59e0b;
      --gray: #6b7280;
      --shadow: 0 10px 26px rgba(31, 41, 55, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 22px 44px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 22px;
    }

    .title-block h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .api-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid #cbd5e1;
      border-radius: 999px;
      background: var(--surface);
      color: #334155;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .api-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #22c55e;
    }

    .panel,
    .metric,
    .result-card,
    .history-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: var(--shadow);
    }

    .panel {
      padding: 18px;
      margin-bottom: 16px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 132px auto auto;
      gap: 12px;
      align-items: end;
    }

    label {
      display: block;
      margin-bottom: 7px;
      color: #374151;
      font-size: 13px;
      font-weight: 700;
    }

    input {
      width: 100%;
      min-height: 42px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 10px 12px;
      background: white;
      color: var(--text);
      font-size: 15px;
    }

    input:focus {
      outline: 2px solid rgba(37, 99, 235, 0.22);
      border-color: var(--blue);
    }

    button {
      min-height: 42px;
      border: 0;
      border-radius: 8px;
      padding: 10px 16px;
      color: white;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      transition: background 120ms ease, opacity 120ms ease;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.65;
    }

    .primary {
      background: var(--blue);
    }

    .primary:hover:not(:disabled) {
      background: var(--blue-dark);
    }

    .secondary {
      background: var(--dark);
    }

    .secondary:hover:not(:disabled) {
      background: var(--dark-hover);
    }

    .status-line {
      display: none;
      margin-top: 14px;
      color: #334155;
      font-size: 14px;
      font-weight: 700;
    }

    .status-line.success {
      color: #047857;
    }

    .error-box {
      display: none;
      margin-top: 14px;
      border: 1px solid #fecaca;
      border-radius: 8px;
      background: #fef2f2;
      color: #991b1b;
      padding: 11px 12px;
      font-size: 14px;
      font-weight: 700;
    }

    .metrics {
      display: none;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin: 16px 0;
    }

    .metric {
      padding: 15px;
    }

    .metric-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .metric-value {
      margin-top: 7px;
      color: #111827;
      font-size: 24px;
      font-weight: 900;
    }

    .empty-state {
      border: 1px dashed #cbd5e1;
      border-radius: 10px;
      background: var(--surface-soft);
      color: var(--muted);
      padding: 28px;
      text-align: center;
      font-weight: 700;
    }

    .results {
      display: grid;
      gap: 14px;
      margin-top: 16px;
    }

    .result-card {
      padding: 18px;
    }

    .card-top {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 5px 10px;
      color: white;
      font-size: 12px;
      font-weight: 900;
      line-height: 1;
      white-space: nowrap;
    }

    .topic-badge {
      background: #e0e7ff;
      color: #3730a3;
    }

    .alert-watch { background: var(--orange); }
    .alert-low { background: var(--gray); }
    .alert-medium { background: var(--blue); }
    .alert-high { background: var(--red); }

    .result-title {
      margin: 0 0 14px;
      font-size: 19px;
      line-height: 1.38;
    }

    a {
      color: #1d4ed8;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin: 14px 0;
    }

    .detail-box {
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: var(--surface-soft);
      padding: 12px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-top: 1px solid #e5e7eb;
      padding: 8px 0;
      font-size: 14px;
    }

    .detail-row:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .detail-row:last-child {
      padding-bottom: 0;
    }

    .label {
      color: var(--muted);
      font-weight: 800;
    }

    .value {
      text-align: right;
      font-weight: 700;
    }

    .decision-summary {
      margin: 14px 0 10px;
      border-left: 4px solid #cbd5e1;
      padding: 10px 12px;
      background: #f8fafc;
      color: #334155;
      line-height: 1.55;
      font-size: 14px;
    }

    .verification-card {
      margin: 14px 0;
      border: 1px solid #dbeafe;
      border-radius: 10px;
      background: #f8fbff;
      padding: 14px;
    }

    .verification-card h3 {
      margin: 0 0 10px;
      font-size: 16px;
    }

    .verification-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .verification-item {
      border-top: 1px solid #e5e7eb;
      padding-top: 9px;
      font-size: 14px;
      line-height: 1.55;
    }

    .verification-item.full {
      grid-column: 1 / -1;
    }

    .source-list {
      display: grid;
      gap: 8px;
      margin-top: 6px;
    }

    .evidence-source {
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #fff;
      padding: 9px;
    }

    .evidence-source-title {
      font-weight: 800;
    }

    .evidence-source-meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .claim-list {
      margin: 8px 0 0;
      padding-left: 20px;
    }

    .claim-list li {
      margin: 6px 0;
    }

    .normalized-claims {
      display: grid;
      gap: 10px;
      margin-top: 8px;
    }

    .normalized-claim {
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #fff;
      padding: 10px;
    }

    .normalized-claim-text {
      font-weight: 800;
      margin-bottom: 8px;
    }

    .normalized-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      font-size: 13px;
    }

    .source-candidate-list {
      display: grid;
      gap: 10px;
      margin-top: 8px;
    }

    .source-candidate {
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #fff;
      padding: 10px;
    }

    .source-candidate-title {
      font-weight: 800;
      margin-bottom: 6px;
    }

    .source-candidate-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      font-size: 13px;
    }

    .source-query-list {
      margin-top: 8px;
      display: grid;
      gap: 6px;
      font-size: 13px;
    }

    .source-link {
      font-size: 13px;
      word-break: break-all;
    }

    .source-button {
      display: inline-flex;
      align-items: center;
      border: 1px solid #bfdbfe;
      border-radius: 8px;
      background: #eff6ff;
      color: #1d4ed8;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 800;
      text-decoration: none;
    }

    .source-button:hover {
      background: #dbeafe;
      text-decoration: none;
    }

    .history-card {
      margin-top: 18px;
      padding: 18px;
    }

    .history-title {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .history-row {
      display: grid;
      grid-template-columns: 60px 1fr;
      gap: 10px;
      border-top: 1px solid #e5e7eb;
      padding: 13px 0;
      font-size: 14px;
    }

    .history-row:first-child {
      border-top: 0;
    }

    .history-id {
      color: #334155;
      font-weight: 900;
    }

    .history-meta {
      margin-top: 6px;
      color: var(--muted);
      line-height: 1.55;
    }

    @media (max-width: 820px) {
      .controls,
      .metrics,
      .detail-grid,
      .verification-grid {
        grid-template-columns: 1fr;
      }

      .normalized-grid {
        grid-template-columns: 1fr 1fr;
      }

      .source-candidate-grid {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .page {
        padding: 20px 14px 34px;
      }

      .detail-row {
        display: block;
      }

      .value {
        display: block;
        margin-top: 4px;
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div class="title-block">
        <h1>정책 AI 대시보드</h1>
        <p class="subtitle">한국 뉴스 기반 정책 검증 인텔리전스</p>
      </div>
      <div class="api-badge"><span class="api-dot"></span>로컬 API 연결됨</div>
    </header>

    <section class="panel">
      <div class="controls">
        <div>
          <label for="query">검색어</label>
          <input id="query" type="text" value="전세대출" autocomplete="off">
        </div>
        <div>
          <label for="maxNews">뉴스 개수</label>
          <input id="maxNews" type="number" min="1" value="2">
        </div>
        <button id="analyzeBtn" class="primary" type="button">분석하기</button>
        <button id="historyBtn" class="secondary" type="button">최근 분석 불러오기</button>
      </div>
      <div id="statusLine" class="status-line"></div>
      <div id="errorBox" class="error-box"></div>
    </section>

    <section id="metrics" class="metrics">
      <div class="metric">
        <div class="metric-label">분석 결과 수</div>
        <div id="metricResults" class="metric-value">0</div>
      </div>
      <div class="metric">
        <div class="metric-label">최고 경고 단계</div>
        <div id="metricAlert" class="metric-value">-</div>
      </div>
      <div class="metric">
        <div class="metric-label">평균 신뢰도</div>
        <div id="metricConfidence" class="metric-value">0</div>
      </div>
      <div class="metric">
        <div class="metric-label">고영향 뉴스 수</div>
        <div id="metricImpact" class="metric-value">0</div>
      </div>
    </section>

    <section id="results" class="results">
      <div class="empty-state">분석을 실행하면 결과가 여기에 표시됩니다.</div>
    </section>

    <section class="history-card">
      <h2 class="history-title">최근 분석 기록</h2>
      <div id="history">
        <div class="empty-state">아직 저장된 분석 기록이 없습니다.</div>
      </div>
    </section>
  </div>

  <script>
    const API_BASE = window.location.origin;

    const queryInput = document.getElementById("query");
    const maxNewsInput = document.getElementById("maxNews");
    const analyzeBtn = document.getElementById("analyzeBtn");
    const historyBtn = document.getElementById("historyBtn");
    const statusLine = document.getElementById("statusLine");
    const errorBox = document.getElementById("errorBox");
    const metricsEl = document.getElementById("metrics");
    const resultsEl = document.getElementById("results");
    const historyEl = document.getElementById("history");

    const metricResults = document.getElementById("metricResults");
    const metricAlert = document.getElementById("metricAlert");
    const metricConfidence = document.getElementById("metricConfidence");
    const metricImpact = document.getElementById("metricImpact");

    const ALERT_RANK = { LOW: 1, WATCH: 2, MEDIUM: 3, HIGH: 4 };
    const ALERT_LABELS = {
      WATCH: "관찰",
      LOW: "낮음",
      MEDIUM: "중간",
      HIGH: "높음",
    };
    const MARKET_SIGNAL_LABELS = {
      housing_tightening_risk: "주거금융 규제 위험",
      housing_support_pressure: "주거지원 압박",
      consumer_credit_relief: "소비자 금융 완화",
      sme_finance_support: "중소기업 금융지원",
      bank_margin_pressure: "은행 마진 압박",
      policy_uncertainty: "정책 불확실성",
      no_clear_signal: "명확한 신호 없음",
    };
    const LEVEL_LABELS = {
      none: "검증 없음",
      low: "낮음",
      medium: "보통",
      high: "높음",
    };
    const DIRECTION_LABELS = {
      positive: "긍정",
      negative: "부정",
      mixed: "혼합",
      uncertain: "불확실",
    };
    const RECOMMENDATION_LABELS = {
      "Monitor official FSC/FSS follow-up before treating as confirmed policy.": "공식 금융당국 후속 발표를 확인하기 전까지 확정 정책으로 보지 말고 관찰하세요.",
      "Track official housing finance restrictions and lender implementation guidance.": "공식 주거금융 규제와 금융기관 실행 지침을 추적하세요.",
      "Track youth housing finance support measures and budget changes.": "청년 주거금융 지원 대책과 예산 변화를 추적하세요.",
      "Treat as verified product-level support and monitor borrower adoption.": "검증된 금융상품 지원으로 보고 실제 이용 확산을 확인하세요.",
      "Monitor SME finance support terms and uptake by eligible workers.": "중소기업 금융지원 조건과 대상 근로자의 이용 현황을 확인하세요.",
      "Monitor product-level rate relief and consumer eligibility conditions.": "상품별 금리 감면 내용과 대상 조건을 확인하세요.",
      "Keep on watchlist until usable official evidence is available.": "확인 가능한 공식 근거가 나올 때까지 관찰 목록에 유지하세요.",
      "No immediate action beyond routine monitoring.": "즉각적인 대응보다는 일반 모니터링을 유지하세요.",
    };
    const VERDICT_LABELS = {
      draft_verified: "공식근거 강함",
      draft_likely_true: "사실 가능성 높음",
      draft_unverified: "미검증",
      draft_needs_context: "추가 맥락 필요",
      draft_misleading: "오해 소지",
      draft_disputed: "상충 근거 있음",
      draft_outdated: "시점 확인 필요",
    };
    const REVIEW_STATUS_LABELS = {
      ai_draft_pending_human_review: "AI 초안, 사람 검토 대기",
    };
    const SOURCE_TYPE_LABELS = {
      official_government: "공식 정부기관",
      public_institution: "공공기관",
      established_news: "언론 기사",
      search_fallback_news: "검색 fallback 기사",
      unknown: "알 수 없음",
    };

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function alertClass(level) {
      const normalized = String(level || "WATCH").toUpperCase();
      if (normalized === "HIGH") return "alert-high";
      if (normalized === "MEDIUM") return "alert-medium";
      if (normalized === "LOW") return "alert-low";
      return "alert-watch";
    }

    function formatSignal(signal) {
      if (Array.isArray(signal)) {
        return signal.map((item) => MARKET_SIGNAL_LABELS[item] || item).join(", ");
      }
      return MARKET_SIGNAL_LABELS[signal] || signal || "-";
    }

    function formatAlert(level) {
      const normalized = String(level || "WATCH").toUpperCase();
      const label = ALERT_LABELS[normalized] || normalized;
      return `${label}(${normalized})`;
    }

    function formatLevel(value) {
      const normalized = String(value || "").toLowerCase();
      return LEVEL_LABELS[normalized] || value || "-";
    }

    function formatDirection(value) {
      const normalized = String(value || "").toLowerCase();
      return DIRECTION_LABELS[normalized] || value || "-";
    }

    function formatRecommendation(value) {
      return RECOMMENDATION_LABELS[value] || value || "-";
    }

    function formatVerdict(value) {
      return VERDICT_LABELS[value] ? `${VERDICT_LABELS[value]}(${value})` : value || "-";
    }

    function formatReviewStatus(value) {
      return REVIEW_STATUS_LABELS[value] || value || "-";
    }

    function formatSourceType(value) {
      return SOURCE_TYPE_LABELS[value] || value || "-";
    }

    function formatList(value) {
      if (Array.isArray(value)) {
        return value.length ? value.join(", ") : "-";
      }
      return value || "-";
    }

    function renderEvidenceSources(sources) {
      const list = Array.isArray(sources) ? sources : [];
      if (!list.length) {
        return '<div class="evidence-source-meta">표시할 근거 출처가 없습니다.</div>';
      }
      return `
        <div class="source-list">
          ${list.map((source) => {
            const sourceTitle = escapeHtml(source.title || source.url || "근거 출처");
            const sourceUrl = escapeHtml(source.url || "");
            const sourceType = escapeHtml(formatSourceType(source.source_type));
            const score = escapeHtml(source.reliability_score ?? "-");
            const reason = escapeHtml(source.reliability_reason || "");
            const titleHtml = sourceUrl
              ? `<a href="${sourceUrl}" target="_blank" rel="noopener noreferrer">${sourceTitle}</a>`
              : sourceTitle;
            return `
              <div class="evidence-source">
                <div class="evidence-source-title">${titleHtml}</div>
                <div class="evidence-source-meta">출처 유형: ${sourceType} · 신뢰도: ${score}/5</div>
                <div class="evidence-source-meta">${reason}</div>
              </div>
            `;
          }).join("")}
        </div>
      `;
    }

    function renderClaimList(claims) {
      const list = Array.isArray(claims) ? claims.filter(Boolean) : [];
      if (!list.length) {
        return '<div class="evidence-source-meta">표시할 핵심 주장 목록이 없습니다.</div>';
      }

      return `<ol class="claim-list">${list.map((claim) => `
        <li>${escapeHtml(claim)}</li>
      `).join("")}</ol>`;
    }

    function formatClaimStatus(value) {
      const labels = {
        proposed: "제안",
        under_review: "검토 중",
        announced: "발표됨",
        implemented: "시행됨",
        denied: "부인됨",
        uncertain: "불확실",
      };
      return labels[value] ? `${labels[value]}(${value})` : value || "-";
    }

    function formatClaimType(value) {
      const labels = {
        policy_action: "정책 조치",
        financial_condition: "금융 조건",
        eligibility: "대상/자격",
        numerical_claim: "수치 주장",
        timeline_claim: "시점 주장",
        market_impact: "시장 영향",
        expert_opinion: "전문가 의견",
        unknown: "미분류",
      };
      return labels[value] ? `${labels[value]}(${value})` : value || "-";
    }

    function formatUncertainty(value) {
      const labels = {
        low: "낮음",
        medium: "보통",
        high: "높음",
      };
      return labels[value] ? `${labels[value]}(${value})` : value || "-";
    }

    function renderNormalizedClaims(normalizedClaims) {
      const list = Array.isArray(normalizedClaims) ? normalizedClaims : [];
      if (!list.length) {
        return '<div class="evidence-source-meta">표시할 정규화된 주장이 없습니다.</div>';
      }

      return `<div class="normalized-claims">${list.map((claim) => `
        <div class="normalized-claim">
          <div class="normalized-claim-text">${escapeHtml(claim.claim_text || "-")}</div>
          <div class="normalized-grid">
            <div><span class="label">주체</span><br>${escapeHtml(claim.actor || "-")}</div>
            <div><span class="label">행동</span><br>${escapeHtml(claim.action || "-")}</div>
            <div><span class="label">대상</span><br>${escapeHtml(claim.target || "-")}</div>
            <div><span class="label">수치</span><br>${escapeHtml(claim.quantity || "-")}</div>
            <div><span class="label">시점</span><br>${escapeHtml(claim.date_or_time || "-")}</div>
            <div><span class="label">지역</span><br>${escapeHtml(claim.location || "-")}</div>
            <div><span class="label">상태</span><br>${escapeHtml(formatClaimStatus(claim.status))}</div>
            <div><span class="label">주장 유형</span><br>${escapeHtml(formatClaimType(claim.claim_type))}</div>
            <div><span class="label">불확실성</span><br>${escapeHtml(formatUncertainty(claim.uncertainty_level))}</div>
            <div><span class="label">객체</span><br>${escapeHtml(claim.object || "-")}</div>
          </div>
        </div>
      `).join("")}</div>`;
    }

    function formatSourcePurpose(value) {
      const labels = {
        primary_source: "1차 공식 근거",
        support: "보강 근거",
        contradiction: "반박 확인",
        fact_check: "팩트체크",
        update: "후속 업데이트",
        news_context: "뉴스 맥락",
      };
      return labels[value] ? `${labels[value]}(${value})` : value || "-";
    }

    function renderSourceQueries(sourceQueries) {
      const list = Array.isArray(sourceQueries) ? sourceQueries.slice(0, 8) : [];
      if (!list.length) {
        return '<div class="evidence-source-meta">생성된 출처 검색 쿼리가 없습니다.</div>';
      }

      return `<div class="source-query-list">${list.map((query) => `
        <div>
          <span class="label">claim #${escapeHtml(Number(query.claim_index ?? 0) + 1)}</span>
          · ${escapeHtml(formatSourcePurpose(query.purpose))}
          · ${escapeHtml(query.query || "-")}
        </div>
      `).join("")}</div>`;
    }

    function renderSourceCandidates(sourceCandidates) {
      const list = Array.isArray(sourceCandidates) ? sourceCandidates.slice(0, 8) : [];
      if (!list.length) {
        return '<div class="evidence-source-meta">표시할 출처 탐색 후보가 없습니다.</div>';
      }

      return `<div class="source-candidate-list">${list.map((source) => {
        const title = escapeHtml(source.title || source.url || "출처 후보");
        const url = escapeHtml(source.url || "");
        const titleHtml = url
          ? `<a href="${url}" target="_blank" rel="noopener noreferrer">${title}</a>`
          : title;
        return `
          <div class="source-candidate">
            <div class="source-candidate-title">${titleHtml}</div>
            <div class="source-candidate-grid">
              <div><span class="label">검색어</span><br>${escapeHtml(source.query_used || "-")}</div>
              <div><span class="label">목적</span><br>${escapeHtml(formatSourcePurpose(source.purpose))}</div>
              <div><span class="label">출처 유형</span><br>${escapeHtml(formatSourceType(source.source_type))}</div>
              <div><span class="label">수집 방식</span><br>${escapeHtml(source.retrieval_method || "-")}</div>
              <div><span class="label">발행처</span><br>${escapeHtml(source.publisher || "-")}</div>
              <div><span class="label">본문 확보</span><br>${source.raw_text_available ? "예" : "아니오"}</div>
            </div>
          </div>
        `;
      }).join("")}</div>`;
    }

    function showStatus(message, success = false) {
      statusLine.textContent = message;
      statusLine.className = success ? "status-line success" : "status-line";
      statusLine.style.display = "block";
    }

    function hideStatus() {
      statusLine.style.display = "none";
      statusLine.textContent = "";
    }

    function showError(message) {
      errorBox.textContent = message;
      errorBox.style.display = "block";
    }

    function hideError() {
      errorBox.style.display = "none";
      errorBox.textContent = "";
    }

    function setBusy(isBusy) {
      analyzeBtn.disabled = isBusy;
      historyBtn.disabled = isBusy;
      queryInput.disabled = isBusy;
      maxNewsInput.disabled = isBusy;
    }

    function computeMetrics(results) {
      const count = results.length;
      const highest = results.reduce((current, result) => {
        const level = String(result.final_decision?.policy_alert_level || "LOW").toUpperCase();
        return (ALERT_RANK[level] || 0) > (ALERT_RANK[current] || 0) ? level : current;
      }, "LOW");
      const totalConfidence = results.reduce((sum, result) => {
        return sum + Number(result.policy_confidence?.policy_confidence_score || 0);
      }, 0);
      const highImpactCount = results.filter((result) => {
        return String(result.policy_impact?.impact_level || "").toLowerCase() === "high";
      }).length;

      return {
        count,
        highest: count ? highest : "-",
        averageConfidence: count ? Math.round(totalConfidence / count) : 0,
        highImpactCount,
      };
    }

    function renderMetrics(results) {
      const metrics = computeMetrics(results);
      metricResults.textContent = metrics.count;
      metricAlert.textContent = metrics.highest === "-" ? "-" : formatAlert(metrics.highest);
      metricConfidence.textContent = metrics.averageConfidence;
      metricImpact.textContent = metrics.highImpactCount;
      metricsEl.style.display = "grid";
    }

    function renderResults(results) {
      if (!results.length) {
        metricsEl.style.display = "none";
        resultsEl.innerHTML = '<div class="empty-state">분석을 실행하면 결과가 여기에 표시됩니다.</div>';
        return;
      }

      renderMetrics(results);
      resultsEl.innerHTML = results.map((result) => {
        const confidence = result.policy_confidence || {};
        const impact = result.policy_impact || {};
        const decision = result.final_decision || {};
        const verification = result.verification_card || result || {};
        const claims = verification.claims || result.claims || [];
        const normalizedClaims = verification.normalized_claims || result.normalized_claims || [];
        const sourceQueries = verification.source_queries || result.source_queries || [];
        const sourceCandidates = verification.source_candidates || result.source_candidates || [];
        const level = String(decision.policy_alert_level || "WATCH").toUpperCase();
        const title = escapeHtml(result.title);
        const url = escapeHtml(result.original_url);

        return `
          <article class="result-card">
            <div class="card-top">
              <span class="badge ${alertClass(level)}">${escapeHtml(formatAlert(level))}</span>
              <span class="badge topic-badge">${escapeHtml(result.topic || "미분류")}</span>
            </div>
            <h2 class="result-title">
              <a href="${url}" target="_blank" rel="noopener noreferrer">${title}</a>
            </h2>
            <div class="detail-grid">
              <div class="detail-box">
                <div class="detail-row">
                  <span class="label">신뢰도 점수</span>
                  <span class="value">${escapeHtml(confidence.policy_confidence_score)}</span>
                </div>
                <div class="detail-row">
                  <span class="label">검증 강도</span>
                  <span class="value">${escapeHtml(formatLevel(confidence.verification_strength))}</span>
                </div>
                <div class="detail-row">
                  <span class="label">위험도</span>
                  <span class="value">${escapeHtml(formatLevel(confidence.risk_level))}</span>
                </div>
                <div class="detail-row">
                  <span class="label">대응 우선순위</span>
                  <span class="value">${escapeHtml(formatLevel(confidence.action_priority))}</span>
                </div>
              </div>
              <div class="detail-box">
                <div class="detail-row">
                  <span class="label">영향도</span>
                  <span class="value">${escapeHtml(formatLevel(impact.impact_level))}</span>
                </div>
                <div class="detail-row">
                  <span class="label">영향 방향</span>
                  <span class="value">${escapeHtml(formatDirection(impact.impact_direction))}</span>
                </div>
                <div class="detail-row">
                  <span class="label">시장 신호</span>
                  <span class="value">${escapeHtml(formatSignal(decision.market_signal))}</span>
                </div>
                <div class="detail-row">
                  <span class="label">권장 조치</span>
                  <span class="value">${escapeHtml(formatRecommendation(decision.action_recommendation))}</span>
                </div>
              </div>
            </div>
            <div class="decision-summary">${escapeHtml(decision.decision_summary)}</div>
            <section class="verification-card">
              <h3>검증 카드</h3>
              <div class="verification-grid">
                <div class="verification-item full">
                  <span class="label">핵심 주장</span><br>
                  ${escapeHtml(verification.claim_text || "-")}
                </div>
                <div class="verification-item full">
                  <span class="label">핵심 주장 목록</span>
                  ${renderClaimList(claims)}
                </div>
                <div class="verification-item full">
                  <span class="label">정규화된 주장</span>
                  ${renderNormalizedClaims(normalizedClaims)}
                </div>
                <div class="verification-item full">
                  <span class="label">출처 탐색 후보</span>
                  ${renderSourceCandidates(sourceCandidates)}
                </div>
                <div class="verification-item full">
                  <span class="label">출처 검색 쿼리</span>
                  ${renderSourceQueries(sourceQueries)}
                </div>
                <div class="verification-item">
                  <span class="label">AI 초안 판정</span><br>
                  <strong>${escapeHtml(formatVerdict(verification.verdict_label))}</strong>
                </div>
                <div class="verification-item">
                  <span class="label">신뢰도</span><br>
                  <strong>${escapeHtml(verification.verdict_confidence ?? "-")}</strong>
                </div>
                <div class="verification-item">
                  <span class="label">출처 신뢰도</span><br>
                  ${escapeHtml(verification.source_reliability_score ?? "-")}/5
                  <div class="evidence-source-meta">${escapeHtml(verification.source_reliability_reason || "")}</div>
                </div>
                <div class="verification-item">
                  <span class="label">리뷰 상태</span><br>
                  ${escapeHtml(formatReviewStatus(verification.review_status))}
                </div>
                <div class="verification-item full">
                  <span class="label">근거 출처</span>
                  ${renderEvidenceSources(verification.evidence_sources)}
                </div>
                <div class="verification-item full">
                  <span class="label">근거 요약</span><br>
                  ${escapeHtml(verification.evidence_summary || "-")}
                </div>
                <div class="verification-item full">
                  <span class="label">부족한 맥락</span><br>
                  ${escapeHtml(formatList(verification.missing_context))}
                </div>
                <div class="verification-item">
                  <span class="label">마지막 확인 시간</span><br>
                  ${escapeHtml(verification.last_checked_at || "-")}
                </div>
              </div>
            </section>
            <div class="source-link">
              <a class="source-button" href="${url}" target="_blank" rel="noopener noreferrer">원문 보기</a>
            </div>
          </article>
        `;
      }).join("");
    }

    function renderHistory(rows) {
      if (!rows.length) {
        historyEl.innerHTML = '<div class="empty-state">아직 저장된 분석 기록이 없습니다.</div>';
        return;
      }

      historyEl.innerHTML = rows.map((row) => `
        <div class="history-row">
          <div class="history-id">#${escapeHtml(row.id)}</div>
          <div>
            <strong>${escapeHtml(row.title)}</strong>
            <div class="history-meta">
              <span class="label">검색어:</span> ${escapeHtml(row.query)}
              &nbsp; <span class="label">주제:</span> ${escapeHtml(row.topic)}
              &nbsp; <span class="label">경고:</span> ${escapeHtml(formatAlert(row.policy_alert_level))}
              &nbsp; <span class="label">AI 초안 판정:</span> ${escapeHtml(formatVerdict(row.verdict_label))}
              <br>
              <span class="label">핵심 주장:</span> ${escapeHtml(row.claim_text || "-")}
              <br>
              <span class="label">생성 시각:</span> ${escapeHtml(row.created_at)}
            </div>
          </div>
        </div>
      `).join("");
    }

    async function analyze() {
      const query = queryInput.value.trim();
      const maxNews = Number(maxNewsInput.value || 2);

      if (!query) {
        alert("검색어를 입력해주세요.");
        return;
      }

      hideError();
      showStatus("정책 신호 분석 중...");
      setBusy(true);

      try {
        const response = await fetch(`${API_BASE}/analyze`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query, max_news: maxNews }),
        });

        if (!response.ok) {
          const body = await response.text();
          throw new Error(body || `HTTP ${response.status}`);
        }

        const data = await response.json();
        renderResults(data.results || []);
        showStatus("분석 완료", true);
      } catch (error) {
        showError(`분석 실패: ${error.message}`);
        hideStatus();
      } finally {
        setBusy(false);
      }
    }

    async function loadHistory() {
      hideError();
      showStatus("최근 분석 불러오는 중...");
      setBusy(true);

      try {
        const response = await fetch(`${API_BASE}/history?limit=10`);
        if (!response.ok) {
          const body = await response.text();
          throw new Error(body || `HTTP ${response.status}`);
        }

        const data = await response.json();
        renderHistory(data.results || []);
        showStatus("최근 분석 불러오기 완료", true);
      } catch (error) {
        showError(`최근 분석 불러오기 실패: ${error.message}`);
        hideStatus();
      } finally {
        setBusy(false);
      }
    }

    analyzeBtn.addEventListener("click", analyze);
    historyBtn.addEventListener("click", loadHistory);
  </script>
</body>
</html>
