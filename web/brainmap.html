<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>뉴스 연결지도 — tickedin</title>
<!--
  BRAINMAP 2d-ii — standalone, hand-authored page (NOT build_index-managed;
  touches none of the index pins). Fetches GET /api/brainmap (the newest
  brainmap_graph row) and renders the 유통/연결 (spread/connection) graph on a
  single canvas. VERDICT-ISOLATED: this page shows NO verdict — cluster labels
  render the stored "N개 매체 보도 중" (spread) verbatim; a node click links
  BACK to its verification card (/?result_id=N) where verification lives.
  Self-contained: inline CSS + JS, no external lib/CDN.
-->
<style>
  /* BRAINMAP-COHESION: tokens mirrored from the main site's design system
     (frontend/styles/main.css :root) so this standalone page reads as tickedin.
     Values copied, not linked — the page stays self-contained (no CDN). */
  :root {
    --ink: #0f172a;          /* headings / strong text */
    --slate: #475569;        /* body text */
    --muted: #94a3b8;        /* captions / secondary */
    --line: #e2e8f0;         /* borders */
    --paper: #ffffff;        /* card surface */
    --canvas: #f6f8fb;       /* page background */
    --brand: #1e5fd8;        /* tickedin blue */
    --brand-ink: #1542a0;    /* darker blue: hover / links */
    --shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    --radius-sm: 9px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--canvas);
    color: var(--ink);
    /* Site body font stack (Pretendard on the main site; graceful Korean
       system fallbacks here — no CDN font load on this standalone page). */
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', system-ui, sans-serif;
    display: flex; flex-direction: column;
  }
  header.map-head {
    background: var(--paper);
    border-bottom: 1px solid var(--line);
    padding: 16px 24px 14px;
    flex: 0 0 auto;
  }
  /* tickedin identity row — mirrors the site's .brand treatment (favicon mark +
     serif wordmark). The wordmark links home. */
  .brand-row {
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .brand {
    display: inline-flex; align-items: center; gap: 8px;
    color: var(--ink); text-decoration: none;
    font-family: 'Noto Serif KR', 'Nanum Myeongjo', 'Apple SD Gothic Neo', serif;
    font-size: 21px; font-weight: 700; letter-spacing: -0.01em;
  }
  .brand img { width: 1.25em; height: 1.25em; object-fit: contain; vertical-align: middle; }
  .brand-page-label {
    color: var(--muted); font-size: 13px; font-weight: 600;
    padding-left: 12px; border-left: 1px solid var(--line);
  }
  .map-home {
    margin-left: auto; font-size: 13px; font-weight: 600;
    color: var(--brand-ink); text-decoration: none;
  }
  .map-home:hover { text-decoration: underline; }
  .map-reset {
    margin-left: auto;
    font-size: 12.5px; font-weight: 600; padding: 5px 13px;
    border: 1px solid var(--line); border-radius: var(--radius-sm);
    background: var(--paper); color: var(--slate); cursor: pointer;
    font-family: inherit;
  }
  .map-reset:hover { color: var(--ink); border-color: var(--muted); }
  .head-row { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
  .map-title {
    font-size: 22px; font-weight: 800; letter-spacing: -0.02em; color: var(--ink);
    font-family: 'Nanum Myeongjo', 'Apple SD Gothic Neo', 'Pretendard', serif;
  }
  /* HONESTY (fixed, always visible): this map is spread/connection, NOT verification. */
  .map-subtitle { margin-top: 6px; font-size: 13.5px; line-height: 1.55; color: var(--slate); }
  .map-subtitle strong { color: var(--ink); font-weight: 700; }
  .legend {
    margin-top: 10px; display: flex; flex-wrap: wrap; gap: 8px 16px;
    font-size: 12.5px; color: var(--slate); align-items: center;
  }
  /* BRAINMAP-FILTER: legend keys are interactive filter toggles. They read as
     calm tappable chips (site tokens), with a clear active state. Clicking a
     domain isolates its constellation; "전체 보기" restores all. */
  .legend .key {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: inherit; font-size: 12.5px; color: var(--slate);
    background: transparent; border: 1px solid transparent; border-radius: 999px;
    padding: 3px 10px; cursor: pointer; line-height: 1.15;
    transition: background .12s, border-color .12s, color .12s;
  }
  .legend .key:hover { background: var(--paper); border-color: var(--line); color: var(--ink); }
  .legend .key:focus-visible { outline: 2px solid var(--brand); outline-offset: 1px; }
  .legend .key.active {
    background: #eef4ff; border-color: var(--brand); color: var(--brand-ink); font-weight: 700;
  }
  .legend .dot {
    width: 10px; height: 10px; border-radius: 50%; display: inline-block;
  }
  .legend .dot.hollow { background: transparent !important; border: 2px solid #98a2b3; }
  main.map-body { position: relative; flex: 1 1 auto; min-height: 0; }
  /* MOBILE-POLISH H: touch-action:none is what lets the touch handlers below see a
     coherent gesture — the default (auto) hands one-finger drags and pinches to the
     browser as page scroll/zoom before any JS runs, so the graph could never pan or
     pinch on a phone. No effect on mouse input. */
  canvas#map { position: absolute; inset: 0; width: 100%; height: 100%; display: block; cursor: default; touch-action: none; }
  /* Tooltip as a light site-style card (paper surface, line border, soft shadow). */
  #tooltip {
    position: absolute; pointer-events: none; display: none;
    max-width: 320px; padding: 9px 12px;
    background: var(--paper); color: var(--ink);
    border: 1px solid var(--line); border-radius: var(--radius-sm);
    font-size: 12.5px; line-height: 1.5;
    box-shadow: var(--shadow); z-index: 5;
  }
  #tooltip .tip-spread { color: var(--brand-ink); margin-top: 4px; font-size: 12px; font-weight: 600; }
  #status {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    color: var(--slate); font-size: 15px; text-align: center; padding: 24px;
  }
</style>
</head>
<body>
<header class="map-head">
  <!-- BRAINMAP-COHESION: tickedin identity row — the site's wordmark (favicon
       mark + serif "tickedin", same treatment as the main header's .brand),
       linking home, with the page label + return link. -->
  <div class="brand-row">
    <a class="brand" href="/" aria-label="tickedin 홈으로"><img src="/web/assets/favicon-180.png" alt="" aria-hidden="true">tickedin</a>
    <span class="brand-page-label">연결지도</span>
    <a class="map-home" href="/">← 홈으로</a>
  </div>
  <div class="head-row">
    <span class="map-title">뉴스 연결지도</span>
    <button type="button" id="resetView" class="map-reset">리셋</button>
  </div>
  <p class="map-subtitle">
    이 지도는 뉴스의 <strong>유통·연결</strong>을 보여줍니다. <strong>검증이 아닙니다.</strong>
    가까이 모인 점은 비슷한 내용이 여러 매체에 보도되었다는 뜻일 뿐, 사실 여부와는 무관합니다.
  </p>
  <div class="legend" id="legend" aria-label="범례"></div>
</header>
<main class="map-body">
  <canvas id="map"></canvas>
  <div id="status">지도를 불러오는 중…</div>
  <div id="tooltip"></div>
</main>
<script>
(function () {
  "use strict";

  // Fixed categorical palette per domain (calm, readable on the light bg).
  var DOMAIN_COLORS = {
    "finance":      "#2b6cb0",
    "welfare":      "#b7791f",
    "agriculture":  "#2f855a",
    "labor":        "#975a16",
    "health":       "#c53030",
    "environment":  "#2c7a7b",
    "SMB":          "#6b46c1",
    "realestate":   "#b83280",
    "statistics":   "#4a5568",
    "education":    "#4c51bf",
    "기타-미분류":   "#98a2b3"
  };
  var DOMAIN_KO = {
    "finance": "금융", "welfare": "복지", "agriculture": "농어업",
    "labor": "고용·노동", "health": "보건", "environment": "환경",
    "SMB": "소상공인·중기", "realestate": "부동산", "statistics": "통계",
    "education": "교육",
    "기타-미분류": "기타"
  };
  var FALLBACK_COLOR = "#98a2b3";
  var PAD = 40;             // canvas margin (px)
  var HIT_RADIUS = 9;       // hover hit-test radius (px)
  var LABEL_TOP_N = 12;     // clusters drawn with an always-on label
  var LABEL_MIN_SIZE = 5;

  var canvas = document.getElementById("map");
  var ctx = canvas.getContext("2d");
  var tooltip = document.getElementById("tooltip");
  var statusEl = document.getElementById("status");

  var graph = null;         // {nodes, edges, clusters}
  var nodeById = {};        // id -> node
  var clusterById = {};     // cluster_id -> cluster meta
  var positions = [];       // per node: {px, py} in CSS pixels
  var labelSpots = [];      // top-cluster label placements
  var hoverNode = null;

  // BRAINMAP-FILTER: client-side domain filter over the already-loaded nodes
  // (no new fetch, no data change). null = show all; {type:'domain', value}
  // isolates one domain; {type:'market'} isolates market_commercial nodes.
  var activeFilter = null;

  // View transform (pan/zoom). Screen = world * scale + offset. Initial
  // {1, 0, 0} is byte-identical to the original static fit-to-viewport view.
  // `positions` / `labelSpots` remain the WORLD layer; this rides on top so
  // node radii, line widths, and label fonts stay constant in SCREEN pixels
  // at any zoom, and the hover hit test uses a constant screen-px radius.
  var view = { scale: 1, offsetX: 0, offsetY: 0 };
  var MIN_SCALE = 0.3, MAX_SCALE = 8;
  var isDragging = false, dragStartX = 0, dragStartY = 0,
      startOffsetX = 0, startOffsetY = 0, dragDist = 0;
  var CLICK_MOVE_THRESHOLD = 4; // screen px; a mouseup past this = pan, not click

  function toScreenX(px) { return px * view.scale + view.offsetX; }
  function toScreenY(py) { return py * view.scale + view.offsetY; }

  function colorFor(domain) {
    return DOMAIN_COLORS[domain] || FALLBACK_COLOR;
  }

  // BRAINMAP-FILTER: is this node in the active filter's set? (all -> always).
  function isActive(n) {
    if (!activeFilter) return true;
    if (activeFilter.type === "market") return n.content_nature === "market_commercial";
    return (n.domain || "기타-미분류") === activeFilter.value;
  }

  function buildLegend(nodes) {
    var counts = {};
    nodes.forEach(function (n) {
      var d = n.domain || "기타-미분류";
      counts[d] = (counts[d] || 0) + 1;
    });
    var order = Object.keys(counts).sort(function (a, b) { return counts[b] - counts[a]; });
    // BRAINMAP-FILTER: each key is a filter toggle. "전체 보기" (active by
    // default) restores all; a domain key isolates its constellation; the
    // hollow market key isolates 시장·시세 nodes. Palette hex unchanged.
    var html = '<button type="button" class="key key-all active" data-filter="all">전체 보기</button>';
    html += order.map(function (d) {
      var name = DOMAIN_KO[d] || d;
      return '<button type="button" class="key" data-filter="domain" data-domain="' + escapeHtml(d) + '">' +
             '<span class="dot" style="background:' + colorFor(d) + '"></span>' +
             escapeHtml(name) + "</button>";
    }).join("");
    html += '<button type="button" class="key" data-filter="market">' +
            '<span class="dot hollow"></span>시장·시세 소식(빈 점)</button>';
    document.getElementById("legend").innerHTML = html;
  }

  function layout() {
    var rect = canvas.parentElement.getBoundingClientRect();
    var w = Math.max(320, rect.width), h = Math.max(280, rect.height);
    var dpr = window.devicePixelRatio || 1;
    canvas.width = Math.round(w * dpr);
    canvas.height = Math.round(h * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    positions = graph.nodes.map(function (n) {
      return {
        px: PAD + n.x * (w - PAD * 2),
        py: PAD + n.y * (h - PAD * 2)
      };
    });

    // Top-N cluster label placements at each cluster's centroid.
    var byCluster = {};
    graph.nodes.forEach(function (n, i) {
      if (n.cluster_id === null || n.cluster_id === undefined) return;
      (byCluster[n.cluster_id] = byCluster[n.cluster_id] || []).push(i);
    });
    var top = graph.clusters
      .filter(function (c) { return c.size >= LABEL_MIN_SIZE; })
      .slice(0, LABEL_TOP_N);
    labelSpots = top.map(function (c) {
      var members = byCluster[c.cluster_id] || [];
      var cx = 0, cy = 0;
      members.forEach(function (i) { cx += positions[i].px; cy += positions[i].py; });
      var m = Math.max(1, members.length);
      var title = c.label_title || "";
      if (title.length > 20) title = title.slice(0, 20) + "…";
      return { cluster_id: c.cluster_id, x: cx / m, y: cy / m, title: title, spread: c.size_label };
    });
  }

  function draw() {
    var w = canvas.width / (window.devicePixelRatio || 1);
    var h = canvas.height / (window.devicePixelRatio || 1);
    ctx.clearRect(0, 0, w, h);

    // BRAINMAP-FILTER: when a domain is isolated, draw only edges whose BOTH
    // endpoints are in the active set (cross-domain edges are hidden).
    var filtering = activeFilter !== null;

    // Edges first — thin, low-alpha. (Line width stays constant in screen px.)
    ctx.lineWidth = 0.7;
    ctx.strokeStyle = "rgba(90, 101, 119, 0.16)";
    ctx.beginPath();
    graph.edges.forEach(function (e) {
      var a = nodeById[e.src], b = nodeById[e.dst];
      if (!a || !b) return;
      if (filtering && !(isActive(a) && isActive(b))) return;
      var pa = positions[a._i], pb = positions[b._i];
      ctx.moveTo(toScreenX(pa.px), toScreenY(pa.py));
      ctx.lineTo(toScreenX(pb.px), toScreenY(pb.py));
    });
    ctx.stroke();

    // BRAINMAP-FILTER: when filtering, draw the non-matching nodes first as a
    // faint gray underlay — the selected domain pops while its place in the
    // whole map stays visible (dim, not hide, to keep spatial context).
    if (filtering) {
      ctx.fillStyle = "#94a3b8";
      graph.nodes.forEach(function (n, i) {
        if (isActive(n)) return;
        var p = positions[i];
        ctx.globalAlpha = 0.10;
        ctx.beginPath();
        ctx.arc(toScreenX(p.px), toScreenY(p.py), 1.8, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;
    }

    // Nodes on top. Clustered nodes slightly larger; market_commercial hollow.
    // Radii are constant screen px (positions transform, sizes do not).
    graph.nodes.forEach(function (n, i) {
      if (filtering && !isActive(n)) return;
      var p = positions[i];
      var clustered = n.cluster_id !== null && n.cluster_id !== undefined;
      var r = clustered ? 3.4 : 2.1;
      var isMarket = n.content_nature === "market_commercial";
      ctx.beginPath();
      ctx.arc(toScreenX(p.px), toScreenY(p.py), r, 0, Math.PI * 2);
      if (isMarket) {
        ctx.globalAlpha = 0.75;
        ctx.lineWidth = 1.4;
        ctx.strokeStyle = colorFor(n.domain);
        ctx.stroke();
        ctx.globalAlpha = 1;
      } else {
        ctx.globalAlpha = clustered ? 0.95 : 0.6;
        ctx.fillStyle = colorFor(n.domain);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    });

    // Hover ring (constant screen-px radius, transformed position).
    if (hoverNode) {
      var hp = positions[hoverNode._i];
      ctx.beginPath();
      ctx.arc(toScreenX(hp.px), toScreenY(hp.py), 6, 0, Math.PI * 2);
      ctx.lineWidth = 1.6;
      ctx.strokeStyle = "#1c2430";
      ctx.stroke();
    }

    // BRAINMAP-FILTER: when filtering, only label clusters that still have a
    // visible (active) member.
    var activeClusters = null;
    if (filtering) {
      activeClusters = {};
      graph.nodes.forEach(function (n) {
        if (isActive(n) && n.cluster_id !== null && n.cluster_id !== undefined) {
          activeClusters[n.cluster_id] = true;
        }
      });
    }

    // Always-on labels for the biggest clusters — stored spread label VERBATIM.
    // Font stays constant screen size; only the anchor point transforms.
    ctx.textAlign = "center";
    labelSpots.forEach(function (s) {
      if (filtering && !activeClusters[s.cluster_id]) return;
      var lx = toScreenX(s.x), ly = toScreenY(s.y);
      ctx.font = "600 12px sans-serif";
      ctx.lineWidth = 3;
      ctx.strokeStyle = "rgba(247, 248, 250, 0.9)";
      ctx.strokeText(s.title, lx, ly - 14);
      ctx.fillStyle = "#1c2430";
      ctx.fillText(s.title, lx, ly - 14);
      ctx.font = "11px sans-serif";
      ctx.strokeText(s.spread, lx, ly);
      ctx.fillStyle = "#5a6577";
      ctx.fillText(s.spread, lx, ly);
    });
  }

  // Hit test in SCREEN space so the radius stays a constant ~9px at any zoom.
  function nearestNode(mx, my) {
    var best = null, bestD = HIT_RADIUS * HIT_RADIUS;
    var filtering = activeFilter !== null;
    for (var i = 0; i < graph.nodes.length; i++) {
      // BRAINMAP-FILTER: hover/click only apply to visible (active) nodes.
      if (filtering && !isActive(graph.nodes[i])) continue;
      var dx = toScreenX(positions[i].px) - mx, dy = toScreenY(positions[i].py) - my;
      var d = dx * dx + dy * dy;
      if (d <= bestD) { bestD = d; best = graph.nodes[i]; }
    }
    return best;
  }

  function onMove(ev) {
    var rect = canvas.getBoundingClientRect();
    var mx = ev.clientX - rect.left, my = ev.clientY - rect.top;
    if (isDragging) {
      // Pan: move the offset by the raw mouse delta; track distance so a
      // genuine click (below threshold) still navigates to the card.
      var ddx = ev.clientX - dragStartX, ddy = ev.clientY - dragStartY;
      dragDist = Math.max(dragDist, Math.abs(ddx) + Math.abs(ddy));
      view.offsetX = startOffsetX + ddx;
      view.offsetY = startOffsetY + ddy;
      hoverNode = null;
      tooltip.style.display = "none";
      draw();
      return;
    }
    var n = nearestNode(mx, my);
    if (n !== hoverNode) { hoverNode = n; draw(); }
    if (!n) { tooltip.style.display = "none"; canvas.style.cursor = "grab"; return; }
    canvas.style.cursor = "pointer";
    var spread = "";
    if (n.cluster_id !== null && n.cluster_id !== undefined && clusterById[n.cluster_id]) {
      spread = '<div class="tip-spread">' + clusterById[n.cluster_id].size_label + "</div>";
    }
    tooltip.innerHTML = escapeHtml(n.title || "(제목 없음)") + spread;
    tooltip.style.display = "block";
    var tx = Math.min(mx + 14, rect.width - 330);
    tooltip.style.left = Math.max(4, tx) + "px";
    tooltip.style.top = (my + 14) + "px";
  }

  function onDown(ev) {
    isDragging = true;
    dragStartX = ev.clientX; dragStartY = ev.clientY;
    startOffsetX = view.offsetX; startOffsetY = view.offsetY;
    dragDist = 0;
    canvas.style.cursor = "grabbing";
  }

  function onUp() {
    if (isDragging) { isDragging = false; canvas.style.cursor = "grab"; }
  }

  // Zoom by `factor`, anchored so the world point under the screen point (mx,my)
  // stays fixed. Extracted from onWheel unchanged (MOBILE-POLISH H) so the wheel
  // and the pinch below drive scale through the SAME math — the only difference is
  // where the anchor comes from (cursor vs pinch midpoint) and how the factor is
  // derived (wheel direction vs finger-distance ratio).
  function zoomAt(mx, my, factor) {
    var wx = (mx - view.offsetX) / view.scale;
    var wy = (my - view.offsetY) / view.scale;
    var s = Math.max(MIN_SCALE, Math.min(MAX_SCALE, view.scale * factor));
    if (s === view.scale) return;
    view.scale = s;
    view.offsetX = mx - wx * s;
    view.offsetY = my - wy * s;
    hoverNode = null;
    tooltip.style.display = "none";
    draw();
  }

  // Scroll-to-zoom, anchored so the world point under the cursor stays fixed.
  function onWheel(ev) {
    ev.preventDefault();
    var rect = canvas.getBoundingClientRect();
    var mx = ev.clientX - rect.left, my = ev.clientY - rect.top;
    zoomAt(mx, my, ev.deltaY < 0 ? 1.1 : 1 / 1.1);
  }

  // ---- MOBILE-POLISH H: touch pan + pinch-zoom ----
  // Every handler above reads clientX/deltaY off a MouseEvent/WheelEvent. A pinch
  // never synthesizes a wheel event on any mobile browser, so onWheel is
  // unreachable from touch by construction — which is why wheel-zoom worked on
  // desktop while the graph did nothing at all on a phone. These handlers are
  // ADDITIVE: touch events never fire for a mouse, so the desktop path above keeps
  // its exact behavior. They reuse the existing view model, the MIN/MAX_SCALE
  // clamp (via zoomAt) and CLICK_MOVE_THRESHOLD rather than introducing their own.
  var touchPanId = null;   // identifier of the finger currently driving a pan
  var pinchGap = 0;        // finger distance at the previous pinch frame
  var touchMoved = false;  // gesture panned/pinched => suppress the synthesized click

  function fingerGap(a, b) {
    var dx = a.clientX - b.clientX, dy = a.clientY - b.clientY;
    return Math.sqrt(dx * dx + dy * dy);
  }

  // Anchor a one-finger pan on `touch`, reusing the mouse drag's offset bookkeeping.
  function seatTouchPan(touch) {
    touchPanId = touch.identifier;
    dragStartX = touch.clientX; dragStartY = touch.clientY;
    startOffsetX = view.offsetX; startOffsetY = view.offsetY;
    pinchGap = 0;
  }

  function onTouchStart(ev) {
    if (ev.touches.length === 1) {
      seatTouchPan(ev.touches[0]);
      touchMoved = false;
    } else if (ev.touches.length === 2) {
      // Second finger down — hand off from pan to pinch.
      touchPanId = null;
      pinchGap = fingerGap(ev.touches[0], ev.touches[1]);
      touchMoved = true;
    }
  }

  function onTouchMove(ev) {
    var touches = ev.touches;
    if (touches.length === 1 && touchPanId !== null
        && touches[0].identifier === touchPanId) {
      ev.preventDefault();
      // Same pan math as onMove: offset moves by the raw finger delta.
      var ddx = touches[0].clientX - dragStartX, ddy = touches[0].clientY - dragStartY;
      if (Math.abs(ddx) + Math.abs(ddy) > CLICK_MOVE_THRESHOLD) touchMoved = true;
      view.offsetX = startOffsetX + ddx;
      view.offsetY = startOffsetY + ddy;
      hoverNode = null;
      tooltip.style.display = "none";
      draw();
      return;
    }
    if (touches.length === 2) {
      ev.preventDefault();
      var gap = fingerGap(touches[0], touches[1]);
      if (pinchGap > 0 && gap > 0) {
        var rect = canvas.getBoundingClientRect();
        zoomAt(
          (touches[0].clientX + touches[1].clientX) / 2 - rect.left,
          (touches[0].clientY + touches[1].clientY) / 2 - rect.top,
          gap / pinchGap
        );
      }
      pinchGap = gap;
      touchMoved = true;
    }
  }

  function onTouchEnd(ev) {
    // A pan/pinch must not also open a card: preventDefault here drops the click
    // the browser would synthesize from the touch sequence. A clean tap (never
    // moved past the threshold) is left alone, so its synthesized click reaches
    // onClick and node navigation keeps working on touch.
    if (touchMoved) ev.preventDefault();
    if (ev.touches.length === 1) {
      // A finger lifted out of a pinch — re-anchor the pan on the survivor so the
      // view doesn't jump by the old finger's offset.
      seatTouchPan(ev.touches[0]);
    } else if (ev.touches.length === 0) {
      touchPanId = null;
      pinchGap = 0;
    }
  }

  function resetView() {
    view.scale = 1; view.offsetX = 0; view.offsetY = 0;
    draw();
  }

  // BRAINMAP-FILTER: legend click = set/toggle the domain filter (delegated).
  // Clicking the already-active filter (or "전체 보기") restores all. Zoom/pan
  // is untouched — filtering only changes which nodes are drawn/dimmed.
  function onLegendClick(ev) {
    var btn = ev.target.closest(".key");
    if (!btn) return;
    var kind = btn.getAttribute("data-filter");
    var next = null;
    if (kind === "domain") next = { type: "domain", value: btn.getAttribute("data-domain") };
    else if (kind === "market") next = { type: "market" };
    // Toggle off when re-clicking the active filter -> back to "전체 보기".
    if (next && activeFilter && next.type === activeFilter.type &&
        (next.type !== "domain" || next.value === activeFilter.value)) {
      next = null;
    }
    activeFilter = next;
    updateLegendActive();
    hoverNode = null;
    tooltip.style.display = "none";
    draw();
  }

  function updateLegendActive() {
    var keys = document.querySelectorAll("#legend .key");
    for (var i = 0; i < keys.length; i++) {
      var k = keys[i], kind = k.getAttribute("data-filter"), on = false;
      if (!activeFilter) on = (kind === "all");
      else if (activeFilter.type === "market") on = (kind === "market");
      else on = (kind === "domain" && k.getAttribute("data-domain") === activeFilter.value);
      if (on) k.classList.add("active"); else k.classList.remove("active");
    }
  }

  function onClick(ev) {
    // A drag past the threshold was a pan, not a click — do not navigate.
    if (dragDist > CLICK_MOVE_THRESHOLD) { dragDist = 0; return; }
    var rect = canvas.getBoundingClientRect();
    var n = nearestNode(ev.clientX - rect.left, ev.clientY - rect.top);
    if (n && n.id) window.location.href = "/?result_id=" + encodeURIComponent(n.id);
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (ch) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch];
    });
  }

  function start(data) {
    if (!data || data.empty === true || !data.nodes || data.nodes.length === 0) {
      statusEl.textContent = "지도가 아직 생성되지 않았습니다.";
      return;
    }
    graph = data;
    graph.nodes.forEach(function (n, i) { n._i = i; nodeById[n.id] = n; });
    (graph.clusters || []).forEach(function (c) { clusterById[c.cluster_id] = c; });
    statusEl.style.display = "none";
    buildLegend(graph.nodes);
    document.getElementById("legend").addEventListener("click", onLegendClick);
    layout();
    draw();
    canvas.style.cursor = "grab";
    canvas.addEventListener("mousemove", onMove);
    canvas.addEventListener("mousedown", onDown);
    window.addEventListener("mouseup", onUp);
    canvas.addEventListener("mouseleave", function () {
      hoverNode = null; tooltip.style.display = "none"; draw();
    });
    canvas.addEventListener("click", onClick);
    canvas.addEventListener("wheel", onWheel, { passive: false });
    canvas.addEventListener("dblclick", resetView);
    // MOBILE-POLISH H: touch pan/pinch. passive:false — every one of these calls
    // preventDefault on a real gesture, which a passive listener may not do.
    canvas.addEventListener("touchstart", onTouchStart, { passive: false });
    canvas.addEventListener("touchmove", onTouchMove, { passive: false });
    canvas.addEventListener("touchend", onTouchEnd, { passive: false });
    canvas.addEventListener("touchcancel", onTouchEnd, { passive: false });
    var resetBtn = document.getElementById("resetView");
    if (resetBtn) resetBtn.addEventListener("click", resetView);
    // BRAINMAP-HOVER A8: ?focus=<result_id> (from the card's 브레인맵에서 유사
    // 보도 보기 link) lands centered + hovered on that card's node, reusing the
    // existing view/hoverNode/draw machinery. Node ids ARE result ids (see
    // onClick). Fail-silent when the id is absent or not in the graph (old
    // card / rebuilt graph) — the map just shows the default view.
    try {
      var focusId = new URLSearchParams(window.location.search).get("focus");
      var focusNode = focusId !== null ? nodeById[focusId] : null;
      if (focusNode) {
        var rect = canvas.parentElement.getBoundingClientRect();
        var fw = Math.max(320, rect.width), fh = Math.max(280, rect.height);
        var fp = positions[focusNode._i];
        view.scale = 2.5;
        view.offsetX = fw / 2 - fp.px * view.scale;
        view.offsetY = fh / 2 - fp.py * view.scale;
        hoverNode = focusNode;
        draw();
        // Same tooltip markup onMove builds, anchored beside the centered node.
        var fspread = "";
        if (focusNode.cluster_id !== null && focusNode.cluster_id !== undefined && clusterById[focusNode.cluster_id]) {
          fspread = '<div class="tip-spread">' + clusterById[focusNode.cluster_id].size_label + "</div>";
        }
        tooltip.innerHTML = escapeHtml(focusNode.title || "(제목 없음)") + fspread;
        tooltip.style.display = "block";
        tooltip.style.left = Math.max(4, Math.min(fw / 2 + 14, fw - 330)) + "px";
        tooltip.style.top = (fh / 2 + 14) + "px";
      }
    } catch (e) { /* focus is optional — never break the map */ }
    // Resize: re-fit the world layer to the new viewport; preserve the
    // current pan/zoom transform on top (a sensible, non-jarring default).
    window.addEventListener("resize", function () { layout(); draw(); });
  }

  fetch("/api/brainmap")
    .then(function (r) {
      if (!r.ok) throw new Error("bad status " + r.status);
      return r.json();
    })
    .then(start)
    .catch(function () {
      statusEl.textContent = "지도를 불러오지 못했습니다. 잠시 후 다시 시도해 주세요.";
    });
})();
</script>
</body>
</html>
