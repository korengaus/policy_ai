<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>주간 확산 리포트 — tickedin</title>
<!-- LINK-PREVIEW: OG/Twitter tags mirror frontend/template.html's set. Circulation
     vocabulary only (확산/매체) — no truth/falsity claim, no counts. Canonical URL
     has no query parameters (archive permalinks share one preview). -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="tickedin">
<meta property="og:locale" content="ko_KR">
<meta property="og:url" content="https://tickedin.org/web/weekly.html">
<meta property="og:title" content="주간 확산 리포트 — tickedin">
<meta property="og:description" content="한 주 동안 가장 많이 확산된 정책 주장을 매체 수 기준으로 보여주는 주간 확산 리포트. 확산 규모 기준이며 사실 검증이 아닙니다.">
<meta property="og:image" content="https://tickedin.org/web/assets/og-weekly.png">
<meta property="og:image:type" content="image/png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="tickedin 주간 확산 리포트 — 이번 주 가장 많이 확산된 정책 주장">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="주간 확산 리포트 — tickedin">
<meta name="twitter:description" content="한 주 동안 가장 많이 확산된 정책 주장을 매체 수 기준으로 보여주는 주간 확산 리포트. 확산 규모 기준이며 사실 검증이 아닙니다.">
<meta name="twitter:image" content="https://tickedin.org/web/assets/og-weekly.png">
<!--
  WEEKLY-REPORT Slice 2 — standalone, hand-authored page (NOT
  build_index-managed; touches none of the index pins — same precedent as
  web/brainmap.html). Fetches GET /api/weekly-report (the stored snapshot
  written by scripts/generate_weekly_report.py) and renders the Top-N
  most-amplified claims of the week. VERDICT-ISOLATED: ranking and display
  are CIRCULATION (distinct outlet count) only — no truth-probability, no
  verdict, no gauge, no red/green semantics. Each title links back to its
  verification card (/?result_id=N) where verification lives.
  Self-contained: inline CSS + JS, no external lib/CDN. Data is rendered via
  textContent (never innerHTML) so API strings are display-only.
-->
<style>
  /* Tokens mirrored from the main site's design system (same set as
     web/brainmap.html) so this standalone page reads as tickedin. */
  :root {
    --ink: #0f172a;
    --slate: #475569;
    --muted: #94a3b8;
    --line: #e2e8f0;
    --paper: #ffffff;
    --canvas: #f6f8fb;
    --brand: #1e5fd8;
    --brand-ink: #1542a0;
    --shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    --radius-sm: 9px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--canvas);
    color: var(--ink);
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', system-ui, sans-serif;
    min-height: 100vh;
  }
  header.report-head {
    background: var(--paper);
    border-bottom: 1px solid var(--line);
    padding: 16px 24px 18px;
  }
  .brand-row {
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .brand {
    display: inline-flex; align-items: center; gap: 8px;
    color: var(--ink); text-decoration: none;
    font-family: 'Noto Serif KR', 'Nanum Myeongjo', 'Apple SD Gothic Neo', serif;
    font-size: 21px; font-weight: 700; letter-spacing: -0.01em;
  }
  .brand img { width: 1.25em; height: 1.25em; object-fit: contain; vertical-align: middle; }
  .brand-page-label {
    color: var(--muted); font-size: 13px; font-weight: 600;
    padding-left: 12px; border-left: 1px solid var(--line);
  }
  .report-home {
    margin-left: auto; font-size: 13px; font-weight: 600;
    color: var(--brand-ink); text-decoration: none;
  }
  .report-home:hover { text-decoration: underline; }
  .report-title {
    font-size: 22px; font-weight: 500; letter-spacing: -0.02em; color: var(--ink);
    /* FONT-SWITCH: page title joins the body sans stack; only .brand stays serif. */
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', system-ui, sans-serif;
  }
  .report-week { margin-top: 4px; font-size: 13.5px; color: var(--slate); font-weight: 600; }
  /* HONESTY (fixed, always visible): circulation ranking, NOT verification. */
  .report-framing {
    margin-top: 10px; display: inline-block;
    background: #eef4ff; border: 1px solid var(--brand);
    color: var(--brand-ink); font-size: 12.5px; font-weight: 700;
    border-radius: 999px; padding: 4px 12px;
  }
  .report-subtitle { margin-top: 8px; font-size: 13.5px; line-height: 1.55; color: var(--slate); }
  .report-subtitle strong { color: var(--ink); font-weight: 700; }
  main.report-body { max-width: 860px; margin: 0 auto; padding: 22px 20px 40px; }
  #status { color: var(--slate); font-size: 15px; text-align: center; padding: 48px 24px; }
  ol.top-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
  .top-item {
    display: flex; align-items: flex-start; gap: 14px;
    background: var(--paper); border: 1px solid var(--line);
    border-radius: var(--radius-sm); box-shadow: var(--shadow);
    padding: 14px 16px;
  }
  .top-rank {
    flex: 0 0 auto; width: 34px; height: 34px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    background: #eef4ff; color: var(--brand-ink);
    font-weight: 800; font-size: 15px;
  }
  .top-main { flex: 1 1 auto; min-width: 0; }
  .top-title {
    color: var(--ink); text-decoration: none;
    font-size: 15.5px; font-weight: 700; line-height: 1.45;
    display: inline-block;
  }
  .top-title:hover { color: var(--brand-ink); text-decoration: underline; }
  .top-meta {
    margin-top: 6px; display: flex; flex-wrap: wrap; gap: 8px 14px;
    align-items: center; font-size: 12.5px; color: var(--slate);
  }
  .outlet-badge {
    display: inline-flex; align-items: center;
    background: #eef4ff; color: var(--brand-ink);
    border-radius: 999px; padding: 2px 10px;
    font-weight: 700; font-size: 12px;
  }
  /* WEEKLY-ARCHIVE: 지난 리포트 list — deliberately unnumbered plain links. */
  .archive-section { max-width: 860px; margin: 0 auto; padding: 4px 20px 26px; }
  .archive-title { font-size: 13.5px; font-weight: 700; color: var(--slate); margin-bottom: 8px; }
  .archive-list { list-style: none; display: flex; flex-direction: column; gap: 5px; }
  .archive-list a { color: var(--brand-ink); text-decoration: none; font-size: 13px; font-weight: 600; }
  .archive-list a:hover { text-decoration: underline; }
  footer.report-foot {
    max-width: 860px; margin: 0 auto; padding: 0 20px 46px;
    font-size: 12.5px; color: var(--muted); line-height: 1.7;
  }
  footer.report-foot a { color: var(--brand-ink); text-decoration: none; font-weight: 600; }
  footer.report-foot a:hover { text-decoration: underline; }
</style>
</head>
<body>
<header class="report-head">
  <div class="brand-row">
    <a class="brand" href="/" aria-label="tickedin 홈으로"><img src="/web/assets/favicon-180.png" alt="" aria-hidden="true">tickedin</a>
    <span class="brand-page-label">주간 리포트</span>
    <a class="report-home" href="/">← 홈으로</a>
  </div>
  <div class="report-title">이번 주 가장 많이 확산된 정책 주장</div>
  <div class="report-week" id="weekRange"></div>
  <div class="report-framing" id="framing">확산 규모 기준 · 사실 검증 아님</div>
  <p class="report-subtitle">
    이 목록은 여러 매체가 <strong>유사하게 보도한 규모</strong> 순입니다.
    <strong>사실 여부에 대한 판단이 아닙니다.</strong>
    제목을 누르면 해당 주장의 검증 카드로 이동합니다.
  </p>
  <!-- NEAR-ANCHOR-LABEL-HONESTY: the stored near_anchor_outlet_count includes the
       anchor's own outlet (build_brainmap_graph.py sim=1.0 self-pass), so the page
       subtracts the 첫 보도 at DISPLAY time. Legend states the exclusion.
       Circulation vocabulary only. -->
  <p class="report-subtitle report-note">
    <strong>문구 거의 동일</strong> = 첫 보도를 제외하고, 첫 보도와 제목·주장 문구가 거의 같은 매체 수입니다.
    전체 확산 매체 수와는 별개이며, 사실 여부 판단이 아닙니다.
  </p>
</header>
<main class="report-body">
  <div id="status">리포트를 불러오는 중…</div>
  <ol class="top-list" id="topList"></ol>
</main>
<!-- WEEKLY-ARCHIVE: filled by JS only when archived weeks exist — an empty
     archive renders nothing here, never fabricated history. -->
<section class="archive-section" id="archive"></section>
<footer class="report-foot" id="foot"></footer>
<script>
(function () {
  "use strict";

  function day(iso) {
    return (typeof iso === "string" && iso.length >= 10) ? iso.slice(0, 10) : "";
  }
  function stamp(iso) {
    if (typeof iso !== "string" || iso.length < 16) return iso || "";
    return iso.slice(0, 16).replace("T", " ") + " UTC";
  }
  // WEEKLY-PAGE-ENRICH: honest spread-SPEED = the first->last SPAN duration only
  // (we have first/last timestamps, NOT a per-outlet arrival curve, so never a
  // "M개 매체 in N시간" rate). "" when either timestamp is missing/unparseable so
  // the caller omits the span; "당일" when the span rounds to <1h.
  function spreadSpeed(firstIso, lastIso) {
    var a = Date.parse(firstIso), b = Date.parse(lastIso);
    if (isNaN(a) || isNaN(b) || b < a) return "";
    var hours = (b - a) / 3600000;
    if (hours < 1) return "확산 속도: 당일";
    if (hours < 24) return "확산 속도: 약 " + Math.round(hours) + "시간";
    return "확산 속도: 약 " + Math.round(hours / 24) + "일";
  }
  function el(tag, className, text) {
    var node = document.createElement(tag);
    if (className) node.className = className;
    if (text !== undefined && text !== null) node.textContent = String(text);
    return node;
  }
  // WEEKLY-ARCHIVE: stable per-week permalink. ?week=YYYY-MM-DD fetches that
  // archived snapshot via the EXISTING /api/weekly-report/{week_start} route
  // and renders it through the same render(report) below (no renderer fork).
  // Absent/malformed -> latest, unchanged. A week with no stored row renders
  // the empty posture — never a fabricated report.
  var weekParam = new URLSearchParams(location.search).get("week") || "";
  if (!/^\d{4}-\d{2}-\d{2}$/.test(weekParam)) weekParam = "";

  function showEmpty() {
    document.getElementById("status").textContent = weekParam
      ? "해당 주간의 리포트가 없습니다."
      : "이번 주 리포트가 아직 준비되지 않았습니다.";
  }

  function render(report) {
    var status = document.getElementById("status");
    var list = document.getElementById("topList");
    var top = Array.isArray(report.top) ? report.top : [];
    if (!top.length) { showEmpty(); return; }

    document.getElementById("weekRange").textContent =
      day(report.week_start) + " ~ " + day(report.week_end);
    // Mandatory honesty framing — the stored string, verbatim (the chip's
    // hardcoded default stays when the payload lacks it).
    if (report.framing) {
      document.getElementById("framing").textContent = report.framing;
    }

    top.forEach(function (item) {
      var li = el("li", "top-item");
      li.appendChild(el("span", "top-rank", item.rank));

      var main = el("div", "top-main");
      var link = el("a", "top-title", item.title || "(제목 없음)");
      var rid = Number(item.representative_analysis_id);
      link.href = rid > 0 ? "/?result_id=" + encodeURIComponent(rid) : "/";
      main.appendChild(link);

      var meta = el("div", "top-meta");
      var outlets = Number(item.outlet_count);
      if (outlets > 0) meta.appendChild(el("span", "outlet-badge", outlets + "개 매체"));
      var from = day(item.window_first_at) || day(item.first_at);
      var to = day(item.window_last_at) || day(item.last_at);
      if (from && to) meta.appendChild(el("span", null, "확산 기간 " + from + " → " + to));
      if (Number(item.window_member_count) > 0) {
        // ARCHIVE-LABEL: on a past-week permalink (?week=...) "이번 주" is wrong —
        // reuse the "해당 주간" vocabulary already used by showEmpty above. The
        // latest view (no ?week) renders the exact same string as before.
        meta.appendChild(el("span", null, (weekParam ? "해당 주간 보도 " : "이번 주 보도 ") + Number(item.window_member_count) + "건"));
      }
      // WEEKLY-PAGE-ENRICH: spread-speed span (first->last duration). Omitted when
      // the timestamps are missing/equal (spreadSpeed returns "").
      var speed = spreadSpeed(item.window_first_at || item.first_at,
                              item.window_last_at || item.last_at);
      if (speed) meta.appendChild(el("span", null, speed));
      // NEAR-ANCHOR-LABEL-HONESTY: the stored count includes the anchor's own
      // outlet, so the DISPLAYED value excludes the 첫 보도 (max(0, stored-1)).
      // 0 renders on purpose — "spreads widely but phrasing differs per outlet"
      // is the honest reading. ABSENT/null/non-finite (old report rows) still
      // hides the span entirely (never renders 0 for missing data). Stored
      // value untouched. Circulation measurement, not a verdict.
      var nearSame = item.near_anchor_outlet_count;
      if (typeof nearSame === "number" && isFinite(nearSame) && nearSame >= 0) {
        var nearShown = Math.max(0, nearSame - 1);
        meta.appendChild(el("span", null, "문구 거의 동일: " + nearShown + "개 매체"));
      }
      main.appendChild(meta);

      li.appendChild(main);
      list.appendChild(li);
    });
    status.style.display = "none";

    var foot = document.getElementById("foot");
    foot.appendChild(el("div", null,
      "기준 시점: " + stamp(report.graph_generated_at) + " 브레인맵 · "
      + stamp(report.generated_at) + " 집계"));
    var mapLine = el("div");
    var mapLink = el("a");
    // NAV-ICON-EVERYWHERE: the #ic-network signature leads the brainmap entrance link.
    // This standalone page has no shared sprite, so the symbol is inlined (static,
    // trusted markup). Geometry matches frontend/template.html's <symbol id="ic-network">.
    mapLink.innerHTML = '<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="vertical-align:-2px;margin-right:4px"><path d="M10.5 10.7 6.5 7.3"/><path d="M13.6 10.8 17.4 8.2"/><path d="M12 14v4"/><path d="M7 6.1 17 6.9"/><circle cx="12" cy="12" r="2.1"/><circle cx="5" cy="6" r="2"/><circle cx="19" cy="7" r="2"/><circle cx="12" cy="20" r="2"/></svg>뉴스 연결지도에서 확산 구조 보기 →';
    mapLink.href = "/web/brainmap.html";
    mapLine.appendChild(mapLink);
    foot.appendChild(mapLine);
  }

  // WEEKLY-ARCHIVE: past-week view — the static "이번 주" heading would be
  // wrong for an archived week, so it drops to the same phrase minus 이번 주,
  // and a back-link to the latest report is added (existing label styles
  // reused; weekRange still shows the actual date range via render()).
  if (weekParam) {
    document.querySelector(".report-title").textContent =
      "가장 많이 확산된 정책 주장";
    var backLine = el("p", "report-subtitle");
    var backStrong = el("strong", null, "지난 리포트");
    var backLink = el("a", "report-home", "최신 리포트 보기 →");
    backLink.href = "/web/weekly.html";
    backLine.appendChild(backStrong);
    backLine.appendChild(document.createTextNode(" · "));
    backLine.appendChild(backLink);
    document.querySelector("header.report-head").appendChild(backLine);
  }

  fetch(weekParam
      ? "/api/weekly-report/" + encodeURIComponent(weekParam)
      : "/api/weekly-report")
    .then(function (response) {
      if (!response.ok) throw new Error("http " + response.status);
      return response.json();
    })
    .then(function (data) {
      if (!data || data.found !== true || !data.report) { showEmpty(); return; }
      render(data.report);
    })
    .catch(function () { showEmpty(); });

  // WEEKLY-ARCHIVE: 지난 리포트 list — one entry per archived week, the ACTUAL
  // date range always shown, deliberately UNNUMBERED (no 1주차/2주차: the two
  // earliest archived ranges overlap because they predate the weekly cron, and
  // explicit ranges keep that visible instead of implying a consecutive,
  // complete series). No total count, nothing summed across weeks. An empty
  // archive renders nothing. Rendered on both the latest and past-week views.
  fetch("/api/weekly-report-weeks")
    .then(function (response) {
      return response.ok ? response.json() : null;
    })
    .then(function (data) {
      var weeks = (data && Array.isArray(data.weeks)) ? data.weeks : [];
      var section = document.getElementById("archive");
      if (!weeks.length || !section) return;
      section.appendChild(el("div", "archive-title", "지난 리포트"));
      var listNode = el("ul", "archive-list");
      weeks.forEach(function (week) {
        var start = day(week.week_start);
        var end = day(week.week_end);
        if (!start) return;
        var item = el("li");
        var link = el("a", null, end ? start + " ~ " + end : start);
        link.href = "/web/weekly.html?week=" + encodeURIComponent(start);
        item.appendChild(link);
        listNode.appendChild(item);
      });
      section.appendChild(listNode);
    })
    .catch(function () {});
})();
</script>
</body>
</html>
